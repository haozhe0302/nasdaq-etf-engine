name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Validate frontend build target
        env:
          URL: ${{ vars.VITE_API_BASE_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          # Production deploys (push to main) MUST have VITE_API_BASE_URL
          # set — otherwise the built bundle would silently ship with
          # same-origin API calls against the SWA host, which is never
          # the intended posture for prod. PR previews (including fork
          # PRs where repo variables may not be exposed) stay non-fatal
          # so preview builds still succeed.
          if [[ -z "${URL:-}" ]]; then
            if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
              echo "::error::VITE_API_BASE_URL is not set. Production deploys to Static Web Apps require it to be configured as a repository variable so the Vite bundle is rebuilt against the correct Phase 2 gateway FQDN."
              echo "::error::Set it at Repo → Settings → Secrets and variables → Actions → Variables → VITE_API_BASE_URL (e.g. https://<gateway-fqdn>)."
              exit 1
            fi
            echo "::warning::VITE_API_BASE_URL is not set; frontend will use same-origin API calls. Non-fatal for PR preview builds."
          else
            echo "Building hqqq-ui against VITE_API_BASE_URL (length=${#URL})"
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_DUNE_08A7A390F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./src/hqqq-ui" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_DUNE_08A7A390F }}
          action: "close"

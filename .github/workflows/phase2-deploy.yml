# Phase 2 — deploy / update the Azure app tier via Bicep with a
# workflow-enforced release-hardening gate.
#
# Pipeline shape (manual trigger only):
#
#   preflight  →  [provision-data]  →  deploy  →  smoke  →  rollback-assist
#                  (opt, gated by                                  (opt, on failure)
#                  provision_data_tier)
#
#   - preflight       : strict pre-create validation. Required secrets
#                       present, RG exists, ACR exists, requested
#                       image_tag exists for ALL 6 Phase 2 images.
#                       When provision_data_tier=true the data-side
#                       secrets (KAFKA_*, REDIS_CONFIGURATION,
#                       TIMESCALE_CONNECTION_STRING) are NOT required —
#                       they will be produced by the provision-data
#                       job — but POSTGRES_ADMIN_PASSWORD is.
#   - provision-data  : optional. When provision_data_tier=true,
#                       deploys infra/azure/data.bicep (Managed Redis,
#                       PostgreSQL Flexible Server, Event Hubs +
#                       topics) and exports its connection-string
#                       outputs as MASKED job outputs that the deploy
#                       job consumes in lieu of the env secrets.
#   - deploy          : bicep build + what-if + create of the app tier
#                       (main.bicep). Publishes a structured `outputs:`
#                       block + a machine-readable run summary.
#   - smoke           : HTTPS probes against the deployed gateway FQDN
#                       (healthz/live, healthz/ready, /api/system/health
#                       with sourceMode=aggregated assertion, /api/quote,
#                       /api/constituents, /api/history?range=1D with
#                       JSON shape assertion). Optional analytics
#                       Container Apps Job dry-run.
#   - rollback-assist : optional, gateway-only revision flip when smoke
#                       fails AND `rollback_on_smoke_failure=true`.
#
# Auth: GitHub OIDC -> Azure (azure/login@v2). The federated app
# registration must have:
#   - Contributor on the Phase 2 resource group
#   - AcrPull / AcrPush on the Phase 2 ACR
#
# Required repository secrets:
#   AZURE_CLIENT_ID
#   AZURE_TENANT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Required environment ('phase2-demo') secrets — when
# provision_data_tier=false (default):
#   KAFKA_BOOTSTRAP_SERVERS
#   KAFKA_SECURITY_PROTOCOL
#   KAFKA_SASL_MECHANISM
#   KAFKA_SASL_USERNAME
#   KAFKA_SASL_PASSWORD
#   REDIS_CONFIGURATION
#   TIMESCALE_CONNECTION_STRING
# Required environment secret — when provision_data_tier=true:
#   POSTGRES_ADMIN_PASSWORD   (used as the Postgres Flexible Server
#                              admin password; must satisfy Azure
#                              complexity rules)
# Required environment secret — when deploy_posture=with-ingress
# (the default runtime path):
#   TIINGO_API_KEY
# Not required when deploy_posture=no-ingress-offline (ingress Container
# App is skipped entirely; the gateway / reference-data / quote-engine
# deploy normally and will run on cached baskets and Redis/Timescale
# state until the operator provisions a live upstream).
#
# Optional repository variables (defaults baked in):
#   PHASE2_RESOURCE_GROUP   (default: rg-hqqq-p2-demo-eus-01)
#   PHASE2_LOCATION         (default: eastus)
#   PHASE2_ACR_NAME         (default: acrhqqqp2demo01)

name: Phase 2 — deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. vsha-abcdef0). 'latest' is allowed but discouraged for reproducibility."
        required: true
        default: "latest"
      bicep_param_file:
        description: "Path to the .bicepparam file to use for the app tier (main.bicep)."
        required: true
        default: "infra/azure/params/main.demo.bicepparam"
      provision_data_tier:
        description: "If true, deploy infra/azure/data.bicep (Managed Redis + PostgreSQL Flexible Server + Event Hubs) before the app tier and pipe its outputs into main.bicep. Off by default so the common app-tier-only redeploy path is unchanged."
        type: boolean
        required: false
        default: false
      data_bicep_param_file:
        description: "Path to the .bicepparam file to use for the data tier (data.bicep). Only consumed when provision_data_tier=true."
        required: false
        default: "infra/azure/params/data.demo.bicepparam"
      what_if_only:
        description: "If true, only run `what-if` and skip the actual deployment + smoke + rollback-assist."
        type: boolean
        required: false
        default: false
      run_analytics_smoke:
        description: "If true, run a short-window analytics Container Apps Job dry-run as part of smoke."
        type: boolean
        required: false
        default: false
      rollback_on_smoke_failure:
        description: "If true and post-deploy smoke fails, attempt a gateway-only revision rollback assist."
        type: boolean
        required: false
        default: false
      deploy_posture:
        description: "Runtime posture for this deployment. 'with-ingress' (default) is the standard Phase 2 path — deploys hqqq-ingress and requires a valid TIINGO_API_KEY. 'no-ingress-offline' is an explicit offline posture that skips the ingress Container App entirely and therefore does NOT require a Tiingo key; use it for reference-data-only demos or when Tiingo is unavailable."
        type: choice
        required: false
        default: "with-ingress"
        options:
          - with-ingress
          - no-ingress-offline

concurrency:
  group: phase2-deploy-${{ github.event.inputs.bicep_param_file }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ── Preflight: fail fast before any what-if / create. ─────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    environment: phase2-demo
    env:
      RESOURCE_GROUP: ${{ vars.PHASE2_RESOURCE_GROUP != '' && vars.PHASE2_RESOURCE_GROUP || 'rg-hqqq-p2-demo-eus-01' }}
      LOCATION: ${{ vars.PHASE2_LOCATION != '' && vars.PHASE2_LOCATION || 'eastus' }}
      PHASE2_ACR_NAME: ${{ vars.PHASE2_ACR_NAME != '' && vars.PHASE2_ACR_NAME || 'acrhqqqp2demo01' }}
    outputs:
      acr_name: ${{ steps.acr.outputs.acr_name }}
      resource_group: ${{ steps.export.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets are present (no values logged)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_SECURITY_PROTOCOL: ${{ secrets.KAFKA_SECURITY_PROTOCOL }}
          KAFKA_SASL_MECHANISM: ${{ secrets.KAFKA_SASL_MECHANISM }}
          KAFKA_SASL_USERNAME: ${{ secrets.KAFKA_SASL_USERNAME }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
          REDIS_CONFIGURATION: ${{ secrets.REDIS_CONFIGURATION }}
          TIMESCALE_CONNECTION_STRING: ${{ secrets.TIMESCALE_CONNECTION_STRING }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          PROVISION_DATA_TIER: ${{ github.event.inputs.provision_data_tier }}
          DEPLOY_POSTURE: ${{ github.event.inputs.deploy_posture }}
        run: |
          set -uo pipefail
          # Aggregate every missing secret in one error block so an
          # operator with a fresh environment sees every gap at once.
          # The set of required secrets depends on whether the
          # data tier will be provisioned in this run and on the
          # requested deploy_posture.
          missing=()
          required_repo=( AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID )
          if [[ "$PROVISION_DATA_TIER" == "true" ]]; then
            required_env=( POSTGRES_ADMIN_PASSWORD )
          else
            required_env=( KAFKA_BOOTSTRAP_SERVERS KAFKA_SECURITY_PROTOCOL \
                           KAFKA_SASL_MECHANISM KAFKA_SASL_USERNAME KAFKA_SASL_PASSWORD \
                           REDIS_CONFIGURATION TIMESCALE_CONNECTION_STRING )
          fi

          # Deploy posture contract:
          #   with-ingress      (default) → deploys hqqq-ingress; TIINGO_API_KEY is REQUIRED.
          #   no-ingress-offline          → ingress is NOT deployed; Tiingo key is OPTIONAL.
          # Anything else is a contract violation and fails preflight.
          case "$DEPLOY_POSTURE" in
            with-ingress)
              required_env+=( TIINGO_API_KEY )
              ;;
            no-ingress-offline)
              ;;
            *)
              echo "::error::Unknown deploy_posture='$DEPLOY_POSTURE'. Valid values: with-ingress, no-ingress-offline."
              exit 1
              ;;
          esac

          # Reject a Tiingo key that is present but an obvious placeholder
          # when we are in with-ingress mode — this maps to the runtime
          # hard-fail inside hqqq-ingress and prevents a successful deploy
          # of a Container App that will then crash on startup.
          if [[ "$DEPLOY_POSTURE" == "with-ingress" ]]; then
            case "${TIINGO_API_KEY:-}" in
              ""|REPLACE_ME*|YOUR_*|changeme*|placeholder*)
                echo "::error::deploy_posture=with-ingress requires a real TIINGO_API_KEY secret in the 'phase2-demo' environment."
                echo "::error::The current value is empty or looks like a placeholder; the ingress container has a runtime hard-fail on placeholder keys."
                echo "::error::Either supply the real key, or re-run with deploy_posture=no-ingress-offline to skip the ingress container."
                exit 1
                ;;
            esac
          fi

          for s in "${required_repo[@]}" "${required_env[@]}"; do
            v="${!s:-}"
            if [[ -z "$v" ]]; then
              missing+=("$s")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Required secrets are missing or empty: ${missing[*]}"
            echo "::error::Repo-level: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID."
            if [[ "$PROVISION_DATA_TIER" == "true" ]]; then
              echo "::error::Environment 'phase2-demo' (provision_data_tier=true mode): POSTGRES_ADMIN_PASSWORD."
              echo "::error::KAFKA_*/REDIS_CONFIGURATION/TIMESCALE_CONNECTION_STRING are NOT required in this mode — they will be produced by the data-tier deployment."
            else
              echo "::error::Environment 'phase2-demo': KAFKA_BOOTSTRAP_SERVERS, KAFKA_SECURITY_PROTOCOL, KAFKA_SASL_MECHANISM, KAFKA_SASL_USERNAME, KAFKA_SASL_PASSWORD, REDIS_CONFIGURATION, TIMESCALE_CONNECTION_STRING."
              echo "::error::To bootstrap a brand-new environment without these secrets, re-run with provision_data_tier=true (and set POSTGRES_ADMIN_PASSWORD)."
            fi
            if [[ "$DEPLOY_POSTURE" == "with-ingress" ]]; then
              echo "::error::deploy_posture=with-ingress also requires TIINGO_API_KEY. Either provision it or re-run with deploy_posture=no-ingress-offline."
            fi
            exit 1
          fi
          echo "All required secrets present for deploy_posture='$DEPLOY_POSTURE' (values not logged)."

      - name: Validate bicep param files exist
        env:
          PROVISION_DATA_TIER: ${{ github.event.inputs.provision_data_tier }}
          DATA_PARAM: ${{ github.event.inputs.data_bicep_param_file }}
        run: |
          set -euo pipefail
          PARAM="${{ github.event.inputs.bicep_param_file }}"
          if [[ ! -f "$PARAM" ]]; then
            echo "::error::App-tier bicep param file not found at '$PARAM'."
            echo "::error::inputs.bicep_param_file must point to an existing file in the repo (e.g. infra/azure/params/main.demo.bicepparam)."
            exit 1
          fi
          echo "App-tier param file '$PARAM' OK."

          if [[ "$PROVISION_DATA_TIER" == "true" ]]; then
            if [[ ! -f "$DATA_PARAM" ]]; then
              echo "::error::Data-tier bicep param file not found at '$DATA_PARAM'."
              echo "::error::inputs.data_bicep_param_file must point to an existing file in the repo (e.g. infra/azure/params/data.demo.bicepparam)."
              exit 1
            fi
            echo "Data-tier param file '$DATA_PARAM' OK."
          else
            echo "provision_data_tier=false; data-tier param file not validated."
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify resource group exists
        id: export
        run: |
          set -euo pipefail
          if ! az group show --name "$RESOURCE_GROUP" --output none 2>/dev/null; then
            echo "::error::Resource group '$RESOURCE_GROUP' does not exist."
            echo "::error::Bootstrap with: az group create --name $RESOURCE_GROUP --location $LOCATION"
            exit 1
          fi
          echo "Resource group '$RESOURCE_GROUP' OK."
          echo "resource_group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"

      - name: Verify ACR exists and is reachable
        id: acr
        run: |
          set -euo pipefail
          if ! az acr show --name "$PHASE2_ACR_NAME" --resource-group "$RESOURCE_GROUP" --output none 2>/dev/null; then
            echo "::error::ACR '$PHASE2_ACR_NAME' was not found in resource group '$RESOURCE_GROUP'."
            echo "::error::Either set repo variable PHASE2_ACR_NAME to the correct registry, or run a first deploy that provisions it."
            exit 1
          fi
          echo "ACR '$PHASE2_ACR_NAME' OK."
          echo "acr_name=$PHASE2_ACR_NAME" >> "$GITHUB_OUTPUT"

      - name: Verify image_tag exists in ACR for all six Phase 2 images
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -uo pipefail
          repos=( hqqq-gateway hqqq-reference-data hqqq-ingress hqqq-quote-engine hqqq-persistence hqqq-analytics )
          missing=()
          for repo in "${repos[@]}"; do
            tags=$(az acr repository show-tags \
              --name "$PHASE2_ACR_NAME" \
              --repository "$repo" \
              --output tsv 2>/dev/null || true)
            if [[ -z "$tags" ]]; then
              missing+=("$repo: repository missing or unreadable")
              continue
            fi
            if ! printf '%s\n' "$tags" | grep -Fxq "$IMAGE_TAG"; then
              missing+=("$repo:$IMAGE_TAG")
            else
              echo "OK: $repo:$IMAGE_TAG"
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::The requested image_tag '$IMAGE_TAG' is missing for the following Phase 2 image(s):"
            for m in "${missing[@]}"; do
              echo "::error::  - $m"
            done
            echo "::error::Run phase2-images.yml on the target commit to publish the tag, then re-run this workflow."
            exit 1
          fi
          echo "All six Phase 2 images carry tag '$IMAGE_TAG' in ACR '$PHASE2_ACR_NAME'."

      - name: Preflight summary
        run: |
          {
            echo "## Phase 2 preflight: PASS"
            echo ""
            echo "- Resource group: \`$RESOURCE_GROUP\`"
            echo "- ACR: \`$PHASE2_ACR_NAME\`"
            echo "- App-tier param file: \`${{ github.event.inputs.bicep_param_file }}\`"
            echo "- Image tag: \`${{ github.event.inputs.image_tag }}\` (verified across all 6 services)"
            echo "- provision_data_tier: \`${{ github.event.inputs.provision_data_tier }}\`"
            if [[ "${{ github.event.inputs.provision_data_tier }}" == "true" ]]; then
              echo "- Data-tier param file: \`${{ github.event.inputs.data_bicep_param_file }}\`"
            fi
            echo "- what_if_only: \`${{ github.event.inputs.what_if_only }}\`"
            echo "- run_analytics_smoke: \`${{ github.event.inputs.run_analytics_smoke }}\`"
            echo "- rollback_on_smoke_failure: \`${{ github.event.inputs.rollback_on_smoke_failure }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Provision data tier: optional, only when bootstrapping. ──────
  # Deploys infra/azure/data.bicep (Managed Redis + Postgres Flexible
  # Server + Event Hubs namespace + the six HQQQ topics + Send,Listen
  # SAS rule), then captures every connection string the app tier
  # needs as MASKED job outputs. The deploy job consumes them through
  # `needs.provision-data.outputs.*` instead of the env secrets.
  #
  # When provision_data_tier=false this job is skipped and the deploy
  # job falls back to the historic env-secret pathway, leaving the
  # app-tier-only fast path completely unchanged.
  provision-data:
    name: Provision data tier
    needs: preflight
    if: ${{ github.event.inputs.provision_data_tier == 'true' }}
    runs-on: ubuntu-latest
    environment: phase2-demo
    env:
      RESOURCE_GROUP: ${{ vars.PHASE2_RESOURCE_GROUP != '' && vars.PHASE2_RESOURCE_GROUP || 'rg-hqqq-p2-demo-eus-01' }}
      LOCATION: ${{ vars.PHASE2_LOCATION != '' && vars.PHASE2_LOCATION || 'eastus' }}
    outputs:
      kafka_bootstrap_servers: ${{ steps.deploy_data.outputs.kafka_bootstrap_servers }}
      kafka_security_protocol: ${{ steps.deploy_data.outputs.kafka_security_protocol }}
      kafka_sasl_mechanism: ${{ steps.deploy_data.outputs.kafka_sasl_mechanism }}
      kafka_sasl_username: ${{ steps.deploy_data.outputs.kafka_sasl_username }}
      kafka_sasl_password: ${{ steps.deploy_data.outputs.kafka_sasl_password }}
      redis_configuration: ${{ steps.deploy_data.outputs.redis_configuration }}
      timescale_connection_string: ${{ steps.deploy_data.outputs.timescale_connection_string }}
      postgres_fqdn: ${{ steps.deploy_data.outputs.postgres_fqdn }}
      postgres_database: ${{ steps.deploy_data.outputs.postgres_database }}
      postgres_admin_login: ${{ steps.deploy_data.outputs.postgres_admin_login }}
      event_hubs_namespace: ${{ steps.deploy_data.outputs.event_hubs_namespace }}
      redis_host: ${{ steps.deploy_data.outputs.redis_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build (validate data-tier template syntax)
        run: az bicep build --file infra/azure/data.bicep

      - name: Data-tier what-if
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/data.bicep \
            --parameters "${{ github.event.inputs.data_bicep_param_file }}" \
            --parameters \
              postgresAdministratorPassword="$POSTGRES_ADMIN_PASSWORD"

      - name: Data-tier deployment create
        id: deploy_data
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          DEPLOY_NAME="phase2-data-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_RUN_ID}"
          OUT_FILE="$(mktemp)"
          az deployment group create \
            --name "$DEPLOY_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/data.bicep \
            --parameters "${{ github.event.inputs.data_bicep_param_file }}" \
            --parameters \
              postgresAdministratorPassword="$POSTGRES_ADMIN_PASSWORD" \
            --query properties.outputs \
            --output json > "$OUT_FILE"

          # Pull every output. The four secret outputs are masked
          # before being written to GITHUB_OUTPUT so they do not
          # appear in any subsequent log line.
          KAFKA_BOOTSTRAP=$(jq -r '.kafkaBootstrapServers.value // empty' "$OUT_FILE")
          KAFKA_SEC=$(jq -r '.kafkaSecurityProtocol.value // empty' "$OUT_FILE")
          KAFKA_MECH=$(jq -r '.kafkaSaslMechanism.value // empty' "$OUT_FILE")
          KAFKA_USER=$(jq -r '.kafkaSaslUsername.value // empty' "$OUT_FILE")
          KAFKA_PASS=$(jq -r '.kafkaSaslPassword.value // empty' "$OUT_FILE")
          REDIS_CONFIG=$(jq -r '.redisConfiguration.value // empty' "$OUT_FILE")
          TIMESCALE_CS=$(jq -r '.timescaleConnectionString.value // empty' "$OUT_FILE")
          PG_FQDN=$(jq -r '.postgresFqdn.value // empty' "$OUT_FILE")
          PG_DB=$(jq -r '.postgresDatabaseName.value // empty' "$OUT_FILE")
          PG_USER=$(jq -r '.postgresAdministratorLogin.value // empty' "$OUT_FILE")
          EH_NS=$(jq -r '.eventHubsNamespaceName.value // empty' "$OUT_FILE")
          REDIS_HOST=$(jq -r '.redisHost.value // empty' "$OUT_FILE")

          # Mask the four real secrets BEFORE any echo touches them.
          # The kafka_bootstrap value is also masked because it is
          # surfaced from a @secure() output even though the host
          # itself is not strictly sensitive.
          for v in "$KAFKA_BOOTSTRAP" "$KAFKA_PASS" "$REDIS_CONFIG" "$TIMESCALE_CS"; do
            if [[ -n "$v" ]]; then
              echo "::add-mask::$v"
            fi
          done

          {
            echo "kafka_bootstrap_servers=$KAFKA_BOOTSTRAP"
            echo "kafka_security_protocol=$KAFKA_SEC"
            echo "kafka_sasl_mechanism=$KAFKA_MECH"
            echo "kafka_sasl_username=$KAFKA_USER"
            echo "kafka_sasl_password=$KAFKA_PASS"
            echo "redis_configuration=$REDIS_CONFIG"
            echo "timescale_connection_string=$TIMESCALE_CS"
            echo "postgres_fqdn=$PG_FQDN"
            echo "postgres_database=$PG_DB"
            echo "postgres_admin_login=$PG_USER"
            echo "event_hubs_namespace=$EH_NS"
            echo "redis_host=$REDIS_HOST"
          } >> "$GITHUB_OUTPUT"

          echo "Data-tier deployment '$DEPLOY_NAME' complete."

      - name: Data-tier summary
        run: |
          {
            echo "## Phase 2 data tier: provisioned"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| Postgres FQDN | \`${{ steps.deploy_data.outputs.postgres_fqdn }}\` |"
            echo "| Postgres database | \`${{ steps.deploy_data.outputs.postgres_database }}\` |"
            echo "| Postgres admin login | \`${{ steps.deploy_data.outputs.postgres_admin_login }}\` |"
            echo "| Event Hubs namespace | \`${{ steps.deploy_data.outputs.event_hubs_namespace }}\` |"
            echo "| Redis host | \`${{ steps.deploy_data.outputs.redis_host }}\` |"
            echo ""
            echo "### Manual post-provision step (REQUIRED before app smoke)"
            echo ""
            echo "TimescaleDB is allow-listed at the server level but the extension is NOT created. Run once against the new database:"
            echo ""
            echo '```bash'
            echo "PGPASSWORD='<POSTGRES_ADMIN_PASSWORD>' psql \\"
            echo "  --host=${{ steps.deploy_data.outputs.postgres_fqdn }} \\"
            echo "  --port=5432 \\"
            echo "  --username=${{ steps.deploy_data.outputs.postgres_admin_login }} \\"
            echo "  --dbname=${{ steps.deploy_data.outputs.postgres_database }} \\"
            echo "  --command='CREATE EXTENSION IF NOT EXISTS timescaledb;'"
            echo '```'
            echo ""
            echo "If your workstation IP is not in \`postgresFirewallAllowedIpRanges\`, append it to the data-tier param file and re-run with \`provision_data_tier=true\` (idempotent), or add a one-off rule via \`az postgres flexible-server firewall-rule create\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy: bicep build + what-if + create, structured outputs. ───
  deploy:
    name: Deploy (${{ github.event.inputs.image_tag }})
    needs: [preflight, provision-data]
    # Run when preflight succeeded AND (provision-data succeeded OR
    # was skipped because provision_data_tier=false). The default
    # job-level success() condition would skip deploy whenever
    # provision-data is skipped, so spell the condition out.
    if: ${{ !cancelled() && needs.preflight.result == 'success' && (needs.provision-data.result == 'success' || needs.provision-data.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: phase2-demo
    env:
      RESOURCE_GROUP: ${{ vars.PHASE2_RESOURCE_GROUP != '' && vars.PHASE2_RESOURCE_GROUP || 'rg-hqqq-p2-demo-eus-01' }}
      LOCATION: ${{ vars.PHASE2_LOCATION != '' && vars.PHASE2_LOCATION || 'eastus' }}
    outputs:
      deployment_name: ${{ steps.deploy.outputs.deployment_name }}
      gateway_fqdn: ${{ steps.deploy.outputs.gateway_fqdn }}
      gateway_app_name: ${{ steps.deploy.outputs.gateway_app_name }}
      gateway_latest_revision: ${{ steps.deploy.outputs.gateway_latest_revision }}
      analytics_job_name: ${{ steps.deploy.outputs.analytics_job_name }}
      acr_login_server: ${{ steps.deploy.outputs.acr_login_server }}
      container_apps_environment: ${{ steps.deploy.outputs.container_apps_environment }}
      image_tag: ${{ github.event.inputs.image_tag }}
      resource_group: ${{ vars.PHASE2_RESOURCE_GROUP != '' && vars.PHASE2_RESOURCE_GROUP || 'rg-hqqq-p2-demo-eus-01' }}
      what_if_only: ${{ github.event.inputs.what_if_only }}
      deploy_posture: ${{ github.event.inputs.deploy_posture }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build (validate template syntax)
        run: az bicep build --file infra/azure/main.bicep

      # ── Resolve connection strings from either (a) the upstream
      # provision-data job's MASKED outputs when provision_data_tier
      # was true this run, or (b) the historic env-secret pathway
      # otherwise. Doing the selection in a single step keeps both
      # what-if and create steps reading the same env block.
      - name: Resolve data-tier secrets for app-tier deploy
        id: resolve_secrets
        env:
          PROVISION_DATA_TIER: ${{ github.event.inputs.provision_data_tier }}
          # provision-data outputs (empty when the job was skipped)
          PD_KAFKA_BOOTSTRAP_SERVERS: ${{ needs.provision-data.outputs.kafka_bootstrap_servers }}
          PD_KAFKA_SECURITY_PROTOCOL: ${{ needs.provision-data.outputs.kafka_security_protocol }}
          PD_KAFKA_SASL_MECHANISM: ${{ needs.provision-data.outputs.kafka_sasl_mechanism }}
          PD_KAFKA_SASL_USERNAME: ${{ needs.provision-data.outputs.kafka_sasl_username }}
          PD_KAFKA_SASL_PASSWORD: ${{ needs.provision-data.outputs.kafka_sasl_password }}
          PD_REDIS_CONFIGURATION: ${{ needs.provision-data.outputs.redis_configuration }}
          PD_TIMESCALE_CONNECTION_STRING: ${{ needs.provision-data.outputs.timescale_connection_string }}
          # env-secret pathway (empty when caller is in the provision_data_tier=true mode)
          ES_KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          ES_KAFKA_SECURITY_PROTOCOL: ${{ secrets.KAFKA_SECURITY_PROTOCOL }}
          ES_KAFKA_SASL_MECHANISM: ${{ secrets.KAFKA_SASL_MECHANISM }}
          ES_KAFKA_SASL_USERNAME: ${{ secrets.KAFKA_SASL_USERNAME }}
          ES_KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
          ES_REDIS_CONFIGURATION: ${{ secrets.REDIS_CONFIGURATION }}
          ES_TIMESCALE_CONNECTION_STRING: ${{ secrets.TIMESCALE_CONNECTION_STRING }}
        run: |
          set -uo pipefail
          if [[ "$PROVISION_DATA_TIER" == "true" ]]; then
            echo "Sourcing app-tier secrets from upstream provision-data job outputs."
            KAFKA_BOOTSTRAP="$PD_KAFKA_BOOTSTRAP_SERVERS"
            KAFKA_SEC="$PD_KAFKA_SECURITY_PROTOCOL"
            KAFKA_MECH="$PD_KAFKA_SASL_MECHANISM"
            KAFKA_USER="$PD_KAFKA_SASL_USERNAME"
            KAFKA_PASS="$PD_KAFKA_SASL_PASSWORD"
            REDIS_CONFIG="$PD_REDIS_CONFIGURATION"
            TIMESCALE_CS="$PD_TIMESCALE_CONNECTION_STRING"
          else
            echo "Sourcing app-tier secrets from phase2-demo environment secrets."
            KAFKA_BOOTSTRAP="$ES_KAFKA_BOOTSTRAP_SERVERS"
            KAFKA_SEC="$ES_KAFKA_SECURITY_PROTOCOL"
            KAFKA_MECH="$ES_KAFKA_SASL_MECHANISM"
            KAFKA_USER="$ES_KAFKA_SASL_USERNAME"
            KAFKA_PASS="$ES_KAFKA_SASL_PASSWORD"
            REDIS_CONFIG="$ES_REDIS_CONFIGURATION"
            TIMESCALE_CS="$ES_TIMESCALE_CONNECTION_STRING"
          fi

          # Defence in depth: the provision-data outputs are already
          # masked but the env-secret values picked up via the
          # secrets context are masked automatically only on the FIRST
          # use; explicitly re-mask either way before they hit the
          # GITHUB_ENV file used by the next steps.
          for v in "$KAFKA_BOOTSTRAP" "$KAFKA_PASS" "$REDIS_CONFIG" "$TIMESCALE_CS"; do
            if [[ -n "$v" ]]; then
              echo "::add-mask::$v"
            fi
          done

          # Surface as plain env vars on the runner so the az calls
          # below stay readable. GITHUB_ENV does NOT log values.
          {
            echo "KAFKA_BOOTSTRAP_SERVERS<<__EOF__"
            echo "$KAFKA_BOOTSTRAP"
            echo "__EOF__"
            echo "KAFKA_SECURITY_PROTOCOL<<__EOF__"
            echo "$KAFKA_SEC"
            echo "__EOF__"
            echo "KAFKA_SASL_MECHANISM<<__EOF__"
            echo "$KAFKA_MECH"
            echo "__EOF__"
            echo "KAFKA_SASL_USERNAME<<__EOF__"
            echo "$KAFKA_USER"
            echo "__EOF__"
            echo "KAFKA_SASL_PASSWORD<<__EOF__"
            echo "$KAFKA_PASS"
            echo "__EOF__"
            echo "REDIS_CONFIGURATION<<__EOF__"
            echo "$REDIS_CONFIG"
            echo "__EOF__"
            echo "TIMESCALE_CONNECTION_STRING<<__EOF__"
            echo "$TIMESCALE_CS"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Resolve deploy posture parameters
        id: posture
        env:
          DEPLOY_POSTURE: ${{ github.event.inputs.deploy_posture }}
        run: |
          set -euo pipefail
          case "$DEPLOY_POSTURE" in
            no-ingress-offline) DEPLOY_INGRESS=false ;;
            *)                  DEPLOY_INGRESS=true ;;
          esac
          echo "deploy_ingress=$DEPLOY_INGRESS" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy_posture='$DEPLOY_POSTURE' -> deployIngress=$DEPLOY_INGRESS"

      - name: Deployment what-if
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          set -euo pipefail
          az deployment group what-if \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters "${{ github.event.inputs.bicep_param_file }}" \
            --parameters \
              imageTag="${{ github.event.inputs.image_tag }}" \
              kafkaBootstrapServers="$KAFKA_BOOTSTRAP_SERVERS" \
              kafkaSecurityProtocol="$KAFKA_SECURITY_PROTOCOL" \
              kafkaSaslMechanism="$KAFKA_SASL_MECHANISM" \
              kafkaSaslUsername="$KAFKA_SASL_USERNAME" \
              kafkaSaslPassword="$KAFKA_SASL_PASSWORD" \
              redisConfiguration="$REDIS_CONFIGURATION" \
              timescaleConnectionString="$TIMESCALE_CONNECTION_STRING" \
              tiingoApiKey="${TIINGO_API_KEY:-}" \
              deployIngress=${{ steps.posture.outputs.deploy_ingress }}

      - name: Deployment create
        if: ${{ github.event.inputs.what_if_only != 'true' }}
        id: deploy
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: |
          set -euo pipefail
          DEPLOY_NAME="phase2-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_RUN_ID}"
          OUT_FILE="$(mktemp)"
          az deployment group create \
            --name "$DEPLOY_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/azure/main.bicep \
            --parameters "${{ github.event.inputs.bicep_param_file }}" \
            --parameters \
              imageTag="${{ github.event.inputs.image_tag }}" \
              kafkaBootstrapServers="$KAFKA_BOOTSTRAP_SERVERS" \
              kafkaSecurityProtocol="$KAFKA_SECURITY_PROTOCOL" \
              kafkaSaslMechanism="$KAFKA_SASL_MECHANISM" \
              kafkaSaslUsername="$KAFKA_SASL_USERNAME" \
              kafkaSaslPassword="$KAFKA_SASL_PASSWORD" \
              redisConfiguration="$REDIS_CONFIGURATION" \
              timescaleConnectionString="$TIMESCALE_CONNECTION_STRING" \
              tiingoApiKey="${TIINGO_API_KEY:-}" \
              deployIngress=${{ steps.posture.outputs.deploy_ingress }} \
            --query properties.outputs \
            --output json > "$OUT_FILE"

          GATEWAY_FQDN=$(jq -r '.gatewayFqdn.value // empty' "$OUT_FILE")
          ANALYTICS_JOB=$(jq -r '.analyticsJobName.value // empty' "$OUT_FILE")
          ACR_LOGIN_SERVER=$(jq -r '.acrLoginServer.value // empty' "$OUT_FILE")
          CAE_NAME=$(jq -r '.containerAppsEnvironmentName.value // empty' "$OUT_FILE")
          GATEWAY_REV=$(jq -r '.gatewayLatestRevisionName.value // empty' "$OUT_FILE")

          # gatewayAppName comes from the bicepparam file, not from the
          # template outputs (kept minimal in main.bicep). Read it back
          # from the deployment record.
          GATEWAY_APP=$(az deployment group show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$DEPLOY_NAME" \
            --query properties.parameters.gatewayAppName.value \
            --output tsv 2>/dev/null || echo "")

          echo "deployment_name=$DEPLOY_NAME" >> "$GITHUB_OUTPUT"
          echo "gateway_fqdn=$GATEWAY_FQDN" >> "$GITHUB_OUTPUT"
          echo "analytics_job_name=$ANALYTICS_JOB" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "container_apps_environment=$CAE_NAME" >> "$GITHUB_OUTPUT"
          echo "gateway_latest_revision=$GATEWAY_REV" >> "$GITHUB_OUTPUT"
          echo "gateway_app_name=$GATEWAY_APP" >> "$GITHUB_OUTPUT"

      - name: Deploy summary
        if: ${{ github.event.inputs.what_if_only != 'true' }}
        run: |
          {
            echo "## Phase 2 deploy: complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Deployment name | \`${{ steps.deploy.outputs.deployment_name }}\` |"
            echo "| Image tag | \`${{ github.event.inputs.image_tag }}\` |"
            echo "| Resource group | \`$RESOURCE_GROUP\` |"
            echo "| Container Apps env | \`${{ steps.deploy.outputs.container_apps_environment }}\` |"
            echo "| ACR login server | \`${{ steps.deploy.outputs.acr_login_server }}\` |"
            echo "| Gateway app | \`${{ steps.deploy.outputs.gateway_app_name }}\` |"
            echo "| Gateway FQDN | \`${{ steps.deploy.outputs.gateway_fqdn }}\` |"
            echo "| Gateway latest revision | \`${{ steps.deploy.outputs.gateway_latest_revision }}\` |"
            echo "| Analytics job | \`${{ steps.deploy.outputs.analytics_job_name }}\` |"
            echo "| what_if_only | \`${{ github.event.inputs.what_if_only }}\` |"
            echo ""
            echo "### Manual smoke (operator copy-paste)"
            echo ""
            echo '```bash'
            echo "curl -fsS https://${{ steps.deploy.outputs.gateway_fqdn }}/healthz/ready"
            echo "curl -fsS https://${{ steps.deploy.outputs.gateway_fqdn }}/api/system/health"
            echo '```'
            echo ""
            echo "### Run analytics on demand"
            echo ""
            echo '```bash'
            echo "az containerapp job start \\"
            echo "  --name ${{ steps.deploy.outputs.analytics_job_name }} \\"
            echo "  --resource-group $RESOURCE_GROUP \\"
            echo "  --env-vars Analytics__StartUtc=2026-04-17T00:00:00Z Analytics__EndUtc=2026-04-18T00:00:00Z"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: What-if-only summary
        if: ${{ github.event.inputs.what_if_only == 'true' }}
        run: |
          {
            echo "## Phase 2 deploy: what-if only"
            echo ""
            echo "No \`az deployment group create\` was performed."
            echo "Smoke + rollback-assist jobs are skipped because what_if_only=true."
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Smoke: HTTPS probes against the deployed gateway. ─────────────
  smoke:
    name: Smoke
    needs: deploy
    if: ${{ github.event.inputs.what_if_only != 'true' }}
    runs-on: ubuntu-latest
    environment: phase2-demo
    env:
      RESOURCE_GROUP: ${{ needs.deploy.outputs.resource_group }}
      GATEWAY_FQDN: ${{ needs.deploy.outputs.gateway_fqdn }}
      GATEWAY_APP_NAME: ${{ needs.deploy.outputs.gateway_app_name }}
      ANALYTICS_JOB_NAME: ${{ needs.deploy.outputs.analytics_job_name }}
      DEPLOY_POSTURE: ${{ needs.deploy.outputs.deploy_posture }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run gateway smoke probes
        id: gateway_smoke
        run: |
          set -uo pipefail
          if [[ -z "${GATEWAY_FQDN:-}" ]]; then
            echo "::error::Gateway FQDN not propagated from deploy job. Aborting smoke."
            exit 1
          fi
          chmod +x infra/azure/scripts/phase2-azure-smoke.sh
          GATEWAY_FQDN="$GATEWAY_FQDN" \
          EXPECT_AGGREGATED=true \
          MODE=standalone \
          DEPLOY_POSTURE="${DEPLOY_POSTURE:-with-ingress}" \
            infra/azure/scripts/phase2-azure-smoke.sh

      - name: Analytics dry-run (optional)
        id: analytics_smoke
        if: ${{ github.event.inputs.run_analytics_smoke == 'true' && success() }}
        run: |
          set -uo pipefail
          if [[ -z "${ANALYTICS_JOB_NAME:-}" || -z "${RESOURCE_GROUP:-}" ]]; then
            echo "::error::Analytics smoke requested but ANALYTICS_JOB_NAME/RESOURCE_GROUP not propagated."
            exit 1
          fi

          # Tight one-hour window ending now. Empty-window analytics is
          # still expected to exit 0 by design (see hqqq-analytics).
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          START=$(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Analytics window: $START -> $END"

          az containerapp job start \
            --name "$ANALYTICS_JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --env-vars \
              "Analytics__StartUtc=$START" \
              "Analytics__EndUtc=$END" \
            --output none

          # Pull the most recent execution name (the one we just kicked).
          EXEC=""
          for _ in 1 2 3 4 5; do
            EXEC=$(az containerapp job execution list \
              --name "$ANALYTICS_JOB_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --query '[0].name' \
              --output tsv 2>/dev/null || echo "")
            if [[ -n "$EXEC" ]]; then break; fi
            sleep 3
          done
          if [[ -z "$EXEC" ]]; then
            echo "::error::Could not enumerate the just-started analytics execution."
            exit 1
          fi
          echo "Polling execution: $EXEC"
          echo "execution_name=$EXEC" >> "$GITHUB_OUTPUT"

          # Bounded poll (~5 min). The job's own replicaTimeout is 30
          # min in Bicep but a 1h smoke window with no expected data
          # should finish well under 5 min.
          status="Running"
          for i in $(seq 1 30); do
            status=$(az containerapp job execution show \
              --name "$ANALYTICS_JOB_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --job-execution-name "$EXEC" \
              --query 'properties.status' \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "  [$i/30] status=$status"
            case "$status" in
              Succeeded) break ;;
              Failed|Degraded|Stopped|Cancelled) break ;;
              *) sleep 10 ;;
            esac
          done
          echo "execution_status=$status" >> "$GITHUB_OUTPUT"
          if [[ "$status" != "Succeeded" ]]; then
            echo "::error::Analytics dry-run did not succeed (status=$status)."
            exit 1
          fi

      - name: Smoke success summary
        if: ${{ success() }}
        run: |
          {
            echo "## Phase 2 smoke: PASS"
            echo ""
            echo "- Gateway: \`https://${GATEWAY_FQDN}\`"
            echo "- /healthz/live, /healthz/ready, /api/system/health (sourceMode=aggregated), /api/quote, /api/constituents, /api/history?range=1D — all green."
            if [[ "${{ github.event.inputs.run_analytics_smoke }}" == "true" ]]; then
              echo "- Analytics dry-run: \`${{ steps.analytics_smoke.outputs.execution_name }}\` -> \`${{ steps.analytics_smoke.outputs.execution_status }}\`"
            else
              echo "- Analytics dry-run: skipped (run_analytics_smoke=false)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke failure diagnostics
        if: ${{ failure() }}
        run: |
          {
            echo "## Phase 2 smoke: FAIL"
            echo ""
            echo "Inspect the logs above for the exact failing endpoint."
            echo ""
            echo "### az inspect commands (copy-paste)"
            echo ""
            echo '```bash'
            echo "RG=${RESOURCE_GROUP}"
            echo "GATEWAY=${GATEWAY_APP_NAME}"
            echo ""
            echo "# Active gateway revisions + traffic split"
            echo "az containerapp revision list --name \$GATEWAY --resource-group \$RG \\"
            echo "  --query \"[].{name:name, active:properties.active, traffic:properties.trafficWeight, image:properties.template.containers[0].image, created:properties.createdTime}\" \\"
            echo "  --output table"
            echo ""
            echo "# Latest gateway logs (last 200 lines)"
            echo "az containerapp logs show --name \$GATEWAY --resource-group \$RG --tail 200"
            if [[ "${{ github.event.inputs.run_analytics_smoke }}" == "true" ]]; then
              echo ""
              echo "# Most recent analytics execution"
              echo "az containerapp job execution list \\"
              echo "  --name ${ANALYTICS_JOB_NAME} \\"
              echo "  --resource-group \$RG \\"
              echo "  --query '[0]'"
            fi
            echo '```'
            if [[ "${{ github.event.inputs.rollback_on_smoke_failure }}" == "true" ]]; then
              echo ""
              echo "rollback_on_smoke_failure=true — gateway rollback assist will run next."
            else
              echo ""
              echo "rollback_on_smoke_failure=false — no automatic rollback. Re-run with rollback_on_smoke_failure=true to attempt a gateway revision flip."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Rollback assist: optional, gateway-only revision flip. ────────
  rollback-assist:
    name: Gateway rollback assist
    needs: [deploy, smoke]
    if: ${{ always() && needs.smoke.result == 'failure' && github.event.inputs.rollback_on_smoke_failure == 'true' && github.event.inputs.what_if_only != 'true' }}
    runs-on: ubuntu-latest
    environment: phase2-demo
    env:
      RESOURCE_GROUP: ${{ needs.deploy.outputs.resource_group }}
      GATEWAY_APP_NAME: ${{ needs.deploy.outputs.gateway_app_name }}
      GATEWAY_LATEST_REVISION: ${{ needs.deploy.outputs.gateway_latest_revision }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Identify previous revision
        id: previous
        run: |
          set -uo pipefail
          if [[ -z "${GATEWAY_APP_NAME:-}" || -z "${RESOURCE_GROUP:-}" ]]; then
            echo "::error::Gateway app name / RG not propagated from deploy. Cannot proceed with rollback assist."
            exit 1
          fi
          echo "Latest gateway revision (this run): ${GATEWAY_LATEST_REVISION:-<unknown>}"

          # Most-recent revision other than the one this run created.
          PREV=$(az containerapp revision list \
            --name "$GATEWAY_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by([?name!=\`${GATEWAY_LATEST_REVISION:-}\`], &properties.createdTime)[-1].name" \
            --output tsv 2>/dev/null || echo "")
          if [[ -z "$PREV" || "$PREV" == "null" ]]; then
            echo "::warning::No retained previous revision found for $GATEWAY_APP_NAME. Skipping destructive flip."
            echo "previous_revision=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Previous revision candidate: $PREV"
          echo "previous_revision=$PREV" >> "$GITHUB_OUTPUT"

      - name: Activate previous revision and shift traffic
        if: ${{ steps.previous.outputs.previous_revision != '' }}
        run: |
          set -euo pipefail
          PREV="${{ steps.previous.outputs.previous_revision }}"

          az containerapp revision activate \
            --name "$GATEWAY_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision "$PREV" \
            --output none

          az containerapp ingress traffic set \
            --name "$GATEWAY_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision-weight "$PREV=100" \
            --output none

          echo "Traffic shifted to previous revision '$PREV'."

      - name: Rollback summary
        if: ${{ always() }}
        run: |
          set -uo pipefail
          PREV="${{ steps.previous.outputs.previous_revision }}"
          {
            echo "## Phase 2 gateway rollback assist"
            echo ""
            echo "- Gateway app: \`${GATEWAY_APP_NAME}\`"
            echo "- This-run revision: \`${GATEWAY_LATEST_REVISION:-<unknown>}\`"
            if [[ -n "$PREV" ]]; then
              echo "- Activated previous revision: \`$PREV\` (100% traffic)."
              echo ""
              echo "Workers + analytics job were NOT touched (gateway-only rollback by design)."
              echo ""
              echo "### Verify"
              echo ""
              echo '```bash'
              echo "az containerapp revision list --name ${GATEWAY_APP_NAME} --resource-group ${RESOURCE_GROUP} \\"
              echo "  --query \"[?properties.active].{name:name, traffic:properties.trafficWeight}\" --output table"
              echo '```'
            else
              echo "- No retained previous revision found. Traffic was NOT shifted."
              echo ""
              echo "Recommended next steps:"
              echo ""
              echo '```bash'
              echo "# Build/push a known-good image set, then re-run phase2-deploy.yml with that image_tag."
              echo "az containerapp revision list --name ${GATEWAY_APP_NAME} --resource-group ${RESOURCE_GROUP} --output table"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

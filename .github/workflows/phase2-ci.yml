name: Phase 2 CI Smoke

on:
  push:
    branches: [main]
    paths:
      - "src/building-blocks/**"
      - "src/services/**"
      - "tests/**"
      - "Directory.Build.props"
      - "Hqqq.sln"
      - "global.json"
      - ".github/workflows/phase2-ci.yml"
  pull_request:
    paths:
      - "src/building-blocks/**"
      - "src/services/**"
      - "tests/**"
      - "Directory.Build.props"
      - "Hqqq.sln"
      - "global.json"
      - ".github/workflows/phase2-ci.yml"

concurrency:
  group: phase2-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verify pinned SDK
        # global.json pins the exact feature band (10.0.2xx,
        # allowPrerelease=false). Fail loudly if the resolver landed on
        # anything else so a misconfigured runner never silently builds
        # against an RC/preview SDK.
        run: |
          dotnet --info
          resolved=$(dotnet --version)
          echo "Resolved SDK: $resolved"
          case "$resolved" in
            10.0.2*) echo "OK: SDK matches the 10.0.2xx feature band pinned in global.json" ;;
            *) echo "::error::Resolved SDK $resolved does not match the 10.0.2xx feature band pinned in global.json"; exit 1 ;;
          esac

      - name: Restore
        run: dotnet restore Hqqq.sln

      - name: Build
        run: dotnet build Hqqq.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Hqqq.sln --no-build --configuration Release --verbosity normal
